<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>浮水印相機</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;background:#111;min-height:100vh;display:flex;flex-direction:column}

/* 觀景窗 */
#vf{position:relative;width:100%;background:#000;overflow:hidden;flex-shrink:0;aspect-ratio:4/3}
@media(orientation:landscape){#vf{aspect-ratio:16/9}#app{max-width:100%}}
#videoEl{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center}
#canvas{display:none}
#shot-canvas{display:none}

/* 縮放 */
#zbar{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.5);border-radius:18px;padding:8px 6px;z-index:10}
#zbar span{color:#fff;font-size:9px}
#zval{color:#44ffcc;font-size:11px;font-weight:700}
#zslider{-webkit-appearance:none;writing-mode:vertical-lr;direction:rtl;width:4px;height:88px;background:rgba(255,255,255,0.25);border-radius:2px;outline:none;cursor:pointer}
#zslider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;margin-left:-8px}

/* 浮水印文字 */
#overlay{position:absolute;bottom:0;left:0;right:100px;padding:8px 10px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.78));pointer-events:none;z-index:5}
#wm-time{color:#fff;font-size:17px;font-weight:700;letter-spacing:2px;text-shadow:1px 1px 4px #000;font-family:monospace}
#wm-date{color:#ddd;font-size:11px;margin-top:2px;text-shadow:1px 1px 3px #000}
#wm-gps{color:#44ffcc;font-size:9.5px;margin-top:3px;text-shadow:1px 1px 3px #000;font-family:monospace;line-height:1.5}

/* 小地圖（用 img 標籤，不受 CORS 限制）*/
#minimap{
  position:absolute;bottom:8px;right:8px;
  width:92px;height:74px;
  border:2px solid #44ffcc;border-radius:4px;
  overflow:hidden;background:#1a2a1a;
  z-index:5;pointer-events:none;
}
#mm-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;color:rgba(68,255,204,0.65);font-size:9px;text-align:center;line-height:1.6
}
/* 地圖用 img tile 拼合顯示 */
#mm-tiles{position:relative;width:100%;height:100%;display:none;overflow:hidden}
#mm-tiles img{position:absolute;image-rendering:auto}
#mm-marker{position:absolute;z-index:2;transform:translate(-50%,-50%)}
#mm-credit{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,0.75);color:#333;font-size:7px;text-align:center;padding:1px;z-index:3}

/* 控制列 */
#controls{display:flex;align-items:center;padding:10px 14px;background:#1a1a1a;flex-shrink:0;gap:10px}
#gps-badge{font-size:10px;padding:4px 8px;border-radius:10px;background:rgba(0,200,120,0.12);color:#44ffcc;border:.5px solid #44ffcc;text-align:center;min-width:68px;line-height:1.5;flex-shrink:0}
#shutter{width:62px;height:62px;border-radius:50%;background:#fff;border:4px solid #888;cursor:pointer;transition:transform .1s,background .15s;flex-shrink:0}
#shutter:active{transform:scale(0.91)}
#right-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
#status{color:#aaa;font-size:10px;text-align:center}
#map-btn{background:rgba(0,200,120,0.14);color:#44ffcc;border:.5px solid #44ffcc;padding:5px 12px;border-radius:12px;font-size:11px;cursor:pointer}
#map-btn:disabled{opacity:.35;cursor:default}

/* 相簿 */
#gallery{padding:6px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.tw{position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;cursor:pointer}
.tw img{width:100%;height:100%;object-fit:cover}
.td{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.65);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}

/* 預覽 Modal */
#pmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:14px}
#pmodal.show{display:flex}
#pimg{max-width:100%;max-height:62vh;border-radius:6px;display:block}
.hint{color:#aaa;font-size:11px;text-align:center;line-height:1.7}
.hint b{color:#fff}
.mbtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#share-btn{background:#44ffcc;color:#000;border:none;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer}
#dl-btn{background:rgba(255,255,255,0.1);color:#fff;border:.5px solid #555;padding:10px 18px;border-radius:20px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
#cls-btn{color:#aaa;background:none;border:.5px solid #555;padding:10px 16px;border-radius:20px;font-size:13px;cursor:pointer}

/* 地圖確認 Modal */
#map-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:998;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:14px}
#map-modal.show{display:flex}
#map-info{color:#44ffcc;font-size:11px;font-family:monospace;text-align:center}
#map-preview-wrap{width:100%;max-width:380px;height:260px;border-radius:8px;overflow:hidden;border:1.5px solid #44ffcc;background:#1a2a1a;position:relative}
#map-preview-tiles{position:relative;width:100%;height:100%;overflow:hidden}
#map-preview-tiles img{position:absolute;image-rendering:auto}
#map-preview-marker{position:absolute;z-index:2;transform:translate(-50%,-50%)}
#map-preview-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(68,255,204,.7);font-size:12px;background:#1a2a1a;z-index:5}
.mhint{color:#888;font-size:10px;text-align:center}
.map-btns{display:flex;gap:10px}
#use-map{background:#44ffcc;color:#000;border:none;padding:9px 22px;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer}
#close-map{color:#aaa;background:none;border:.5px solid #555;padding:9px 16px;border-radius:18px;font-size:13px;cursor:pointer}

/* 無相機 */
#nocam{display:none;flex-direction:column;align-items:center;justify-content:center;color:#888;font-size:14px;text-align:center;padding:40px 20px;line-height:2;position:absolute;inset:0}
#retrybtn{background:#44ffcc;color:#000;border:none;padding:9px 22px;border-radius:18px;cursor:pointer;font-size:13px;font-weight:600;margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <div id="vf">
    <video id="videoEl" autoplay playsinline muted></video>
    <div id="nocam">
      <div style="font-size:48px;margin-bottom:8px">📷</div>
      無法存取相機<br>請允許相機權限<br>
      <button id="retrybtn" onclick="initCamera()">重試</button>
    </div>
    <canvas id="canvas"></canvas>
    <canvas id="shot-canvas"></canvas>

    <div id="zbar">
      <span>ZOOM</span>
      <input type="range" id="zslider" min="1" max="5" step="0.1" value="1">
      <div id="zval">1×</div>
    </div>

    <div id="overlay">
      <div id="wm-time">--:--:--</div>
      <div id="wm-date">----.--.--</div>
      <div id="wm-gps">GPS 定位中...</div>
    </div>

    <div id="minimap">
      <div id="mm-placeholder">等待<br>GPS...</div>
      <div id="mm-tiles"></div>
    </div>
  </div>

  <div id="controls">
    <div id="gps-badge">● 定位中</div>
    <button id="shutter" onclick="takePhoto()"></button>
    <div id="right-col">
      <div id="status">準備拍攝</div>
      <button id="map-btn" disabled onclick="openMapModal()">📍 抓地圖</button>
    </div>
  </div>
  <div id="gallery"></div>
</div>

<!-- 預覽 Modal -->
<div id="pmodal">
  <img id="pimg" src="" alt="預覽">
  <p class="hint" id="save-hint"></p>
  <div class="mbtns">
    <button id="share-btn" onclick="sharePhoto()">📤 分享 / 存相簿</button>
    <a id="dl-btn" href="#" download="photo.jpg">⬇ 下載</a>
    <button id="cls-btn" onclick="closePrev()">關閉</button>
  </div>
</div>

<!-- 地圖確認 Modal -->
<div id="map-modal">
  <div id="map-info">載入地圖...</div>
  <div id="map-preview-wrap">
    <div id="map-preview-loading">地圖載入中...</div>
    <div id="map-preview-tiles"></div>
  </div>
  <p class="mhint">確認位置無誤後，按「使用此地圖」</p>
  <div class="map-btns">
    <button id="use-map" onclick="useThisMap()">✔ 使用此地圖</button>
    <button id="close-map" onclick="closeMapModal()">取消</button>
  </div>
</div>

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
'use strict';
let gps={lat:null,lon:null,acc:null,ok:false};
let photos=[];
let mapReady=false;         // 地圖 img 已載入完成
let currentStream=null, videoTrack=null, zoomLevel=1;
let currentPhotoIdx=0;

/* ═══ 工具函式 ═══ */
function ll2t(la,lo,z){
  const n=1<<z, x=Math.floor((lo+180)/360*n);
  const r=la*Math.PI/180;
  return {x,y:Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n)};
}
function t2ll(x,y,z){
  const n=1<<z;
  return {lat:Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI,lon:x/n*360-180};
}

/* ═══ 相機 ═══ */
async function initCamera(){
  const vid=document.getElementById('videoEl'),nocam=document.getElementById('nocam');
  if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
  try{
    currentStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:3840},height:{ideal:2160}},audio:false
    });
    vid.srcObject=currentStream; vid.style.display='block'; nocam.style.display='none';
    videoTrack=currentStream.getVideoTracks()[0];
    setupZoom();
  }catch(e){
    vid.style.display='none'; nocam.style.display='flex'; setStatus('相機未啟動');
  }
}

/* ═══ 縮放 ═══ */
function setupZoom(){
  const sl=document.getElementById('zslider');
  const caps=videoTrack&&videoTrack.getCapabilities?videoTrack.getCapabilities():{};
  if(caps.zoom){
    sl.min=caps.zoom.min||1; sl.max=caps.zoom.max||5; sl.value=caps.zoom.min||1;
    sl.oninput=()=>{
      zoomLevel=parseFloat(sl.value);
      document.getElementById('zval').textContent=zoomLevel.toFixed(1)+'×';
      videoTrack.applyConstraints({advanced:[{zoom:zoomLevel}]}).catch(()=>{});
    };
  } else {
    sl.oninput=()=>{
      zoomLevel=parseFloat(sl.value);
      document.getElementById('zval').textContent=zoomLevel.toFixed(1)+'×';
      document.getElementById('videoEl').style.transform=`scale(${zoomLevel})`;
    };
  }
}

/* ═══ 方向 ═══ */
function updateOrientation(){
  document.getElementById('vf').style.aspectRatio=
    window.innerWidth>window.innerHeight?'16/9':'4/3';
}
window.addEventListener('resize',updateOrientation);
window.addEventListener('orientationchange',()=>setTimeout(updateOrientation,350));
updateOrientation();

/* ═══ GPS ═══ */
function initGPS(){
  if(!navigator.geolocation){setText('wm-gps','GPS 不支援');return;}
  navigator.geolocation.getCurrentPosition(onGPS,onGPSErr,
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
  navigator.geolocation.watchPosition(onGPS,onGPSErr,
    {enableHighAccuracy:true,maximumAge:0,timeout:15000});
}
function onGPS(pos){
  gps.lat=pos.coords.latitude; gps.lon=pos.coords.longitude;
  gps.acc=Math.round(pos.coords.accuracy); gps.ok=true;
  const ld=gps.lat>=0?'N':'S', lo=gps.lon>=0?'E':'W';
  setText('wm-gps',
    `${Math.abs(gps.lat).toFixed(5)}°${ld}  ${Math.abs(gps.lon).toFixed(5)}°${lo}  ±${gps.acc}m`);
  setText('gps-badge',`● ±${gps.acc}m`);
  document.getElementById('map-btn').disabled=false;
}
function onGPSErr(){setText('wm-gps','GPS 定位失敗');setText('gps-badge','● 無GPS');}

/* ═══ 地圖 tile 顯示（純 img 標籤，不畫 canvas，無 CORS 問題）═══ */
/*
  原理：
  - 計算中心 tile 座標，取 3×3 共 9 張 tile 圖片
  - 每張用 <img> 絕對定位拼合在容器內
  - 計算 GPS 座標對應的像素位置，疊加 SVG 標記
  - 因為只是「顯示」img，不走 canvas drawImage，完全沒有 CORS 問題
  - 拍照時用 html2canvas 截取整個 #vf DOM（含 video + overlay + minimap）
*/
function renderMapTiles(containerId, lat, lon, zoom, W, H){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  const {x,y}=ll2t(lat,lon,zoom);
  const TS=256;
  // 計算容器需要幾塊 tile
  const cols=Math.ceil(W/TS)+2, rows=Math.ceil(H/TS)+2;
  // 中心 tile 在容器中的偏移（讓 GPS 點在中央）
  const TL=t2ll(x,y,zoom), TLpx=ll2t(lat,lon,zoom);
  // GPS 點在 tile (x,y) 內的像素偏移
  const fracX=(lon-TL.lon)/(t2ll(x+1,y,zoom).lon-TL.lon);
  const fracY=(TL.lat-lat)/(TL.lat-t2ll(x,y+1,zoom).lat);
  const gpsPxInTile={x:Math.round(fracX*TS), y:Math.round(fracY*TS)};
  // 中心 tile 左上角應在容器的位置（讓 GPS 點在容器中央）
  const centerTileOriginX=W/2 - gpsPxInTile.x;
  const centerTileOriginY=H/2 - gpsPxInTile.y;
  const startTileX=x - Math.ceil((W/2)/TS) - 1;
  const startTileY=y - Math.ceil((H/2)/TS) - 1;
  const endTileX=x + Math.ceil((W/2)/TS) + 1;
  const endTileY=y + Math.ceil((H/2)/TS) + 1;
  const svrs=['a','b','c'];
  for(let ty=startTileY; ty<=endTileY; ty++){
    for(let tx=startTileX; tx<=endTileX; tx++){
      const img=document.createElement('img');
      const s=svrs[(Math.abs(tx)+Math.abs(ty))%3];
      img.src=`https://${s}.tile.openstreetmap.org/${zoom}/${tx}/${ty}.png`;
      img.style.cssText=`position:absolute;width:${TS}px;height:${TS}px;`+
        `left:${centerTileOriginX+(tx-x)*TS}px;`+
        `top:${centerTileOriginY+(ty-y)*TS}px;`+
        `pointer-events:none`;
      container.appendChild(img);
    }
  }
  // GPS 標記（SVG，絕對定位在容器中央）
  const marker=document.createElement('div');
  marker.style.cssText=`position:absolute;left:${W/2}px;top:${H/2}px;transform:translate(-50%,-50%);z-index:10;pointer-events:none`;
  marker.innerHTML=`<svg width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="12" fill="rgba(229,57,53,0.2)" stroke="rgba(229,57,53,0.5)" stroke-width="1"/>
    <line x1="4" y1="14" x2="24" y2="14" stroke="#e53935" stroke-width="2"/>
    <line x1="14" y1="4" x2="14" y2="24" stroke="#e53935" stroke-width="2"/>
    <circle cx="14" cy="14" r="5" fill="rgba(229,57,53,0.9)" stroke="#fff" stroke-width="2"/>
  </svg>`;
  container.appendChild(marker);
  // 版權
  const credit=document.createElement('div');
  credit.style.cssText='position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,0.8);color:#333;font-size:7px;text-align:center;padding:1px 2px;z-index:11;pointer-events:none';
  credit.textContent='© OpenStreetMap contributors';
  container.appendChild(credit);
}

/* ═══ 地圖 Modal ═══ */
function openMapModal(){
  if(!gps.ok){alert('GPS 尚未定位');return;}
  const ld=gps.lat>=0?'N':'S', lo=gps.lon>=0?'E':'W';
  setText('map-info',
    `${Math.abs(gps.lat).toFixed(5)}°${ld}  ${Math.abs(gps.lon).toFixed(5)}°${lo}  ±${gps.acc}m`);
  const loading=document.getElementById('map-preview-loading');
  const tilesDiv=document.getElementById('map-preview-tiles');
  loading.style.display='flex'; tilesDiv.style.display='none';
  // 延遲一點讓 modal 先顯示
  document.getElementById('map-modal').classList.add('show');
  setTimeout(()=>{
    const W=380, H=260;
    tilesDiv.style.cssText=`position:relative;width:${W}px;height:${H}px;overflow:hidden`;
    renderMapTiles('map-preview-tiles', gps.lat, gps.lon, 16, W, H);
    loading.style.display='none'; tilesDiv.style.display='block';
  }, 100);
}
function closeMapModal(){
  document.getElementById('map-modal').classList.remove('show');
}
function useThisMap(){
  closeMapModal();
  // 在觀景窗小地圖也渲染
  const mm=document.getElementById('mm-tiles');
  const ph=document.getElementById('mm-placeholder');
  mm.style.cssText='position:relative;width:92px;height:74px;overflow:hidden;display:block';
  renderMapTiles('mm-tiles', gps.lat, gps.lon, 16, 92, 74);
  ph.style.display='none';
  mapReady=true;
  setText('map-btn','📍 重新抓');
  setStatus('地圖已更新 ✓');
}

/* ═══ 拍照（用 html2canvas 截取整個觀景窗含地圖）═══ */
async function takePhoto(){
  const vid=document.getElementById('videoEl');
  if(!vid.srcObject){setStatus('請先啟動相機');return;}
  setStatus('拍攝中...');

  // 先把 video 畫到 canvas（保留原始解析度）
  const VW=vid.videoWidth||1280, VH=vid.videoHeight||960;
  const cvs=document.getElementById('canvas');
  cvs.width=VW; cvs.height=VH;
  const ctx=cvs.getContext('2d');
  if(zoomLevel>1&&!(videoTrack&&videoTrack.getCapabilities&&videoTrack.getCapabilities().zoom)){
    const cW=VW/zoomLevel,cH=VH/zoomLevel;
    ctx.drawImage(vid,(VW-cW)/2,(VH-cH)/2,cW,cH,0,0,VW,VH);
  } else {
    ctx.drawImage(vid,0,0,VW,VH);
  }

  // 時間文字
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const tStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const dStr=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
  const days=['日','一','二','三','四','五','六'];
  const dtStr=`${dStr} 週${days[now.getDay()]}`;
  const ld=gps.lat>=0?'N':'S', lo=gps.lon>=0?'E':'W';
  const gStr=gps.ok
    ?`${Math.abs(gps.lat).toFixed(5)}°${ld}  ${Math.abs(gps.lon).toFixed(5)}°${lo}  ±${gps.acc}m`
    :'GPS 未定位';

  // 底部漸層
  const bH=Math.round(VH*.23);
  const gr=ctx.createLinearGradient(0,VH-bH,0,VH);
  gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle=gr; ctx.fillRect(0,VH-bH,VW,bH);
  const fs=Math.max(16,Math.round(VW*.034));
  ctx.shadowColor='#000'; ctx.shadowBlur=6;
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(fs*1.4)}px monospace`;
  ctx.fillText(tStr,16,VH-Math.round(bH*.57));
  ctx.fillStyle='#ddd'; ctx.font=`${Math.round(fs*.84)}px sans-serif`;
  ctx.fillText(dtStr,16,VH-Math.round(bH*.28));
  ctx.fillStyle='#44ffcc'; ctx.font=`${Math.round(fs*.77)}px monospace`;
  ctx.fillText(gStr,16,VH-Math.round(bH*.07));
  ctx.shadowBlur=0;

  if(mapReady){
    // 用 html2canvas 截取 #minimap DOM（含 img tiles）
    try{
      const mmEl=document.getElementById('minimap');
      const mapCvs=await html2canvas(mmEl,{
        useCORS:true, allowTaint:true,
        scale:VW/document.getElementById('vf').offsetWidth,
        logging:false, backgroundColor:null
      });
      // 計算地圖在照片中的位置（對應觀景窗右下角）
      const vfEl=document.getElementById('vf');
      const vfW=vfEl.offsetWidth, vfH=vfEl.offsetHeight;
      const mmRect=mmEl.getBoundingClientRect();
      const vfRect=vfEl.getBoundingClientRect();
      const scaleX=VW/vfW, scaleY=VH/vfH;
      const destX=Math.round((mmRect.left-vfRect.left)*scaleX);
      const destY=Math.round((mmRect.top-vfRect.top)*scaleY);
      const destW=Math.round(mmRect.width*scaleX);
      const destH=Math.round(mmRect.height*scaleY);
      ctx.drawImage(mapCvs,0,0,mapCvs.width,mapCvs.height,destX,destY,destW,destH);
      // 邊框
      ctx.strokeStyle='#44ffcc'; ctx.lineWidth=Math.max(2,VW*.003);
      ctx.strokeRect(destX,destY,destW,destH);
    }catch(e){
      console.warn('html2canvas 失敗，使用fallback',e);
      drawFallback(ctx,VW,VH);
    }
  } else {
    drawFallback(ctx,VW,VH);
  }

  const fnT=`${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const fnD=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const url=cvs.toDataURL('image/jpeg',.94);
  photos.unshift({url,tStr:fnT,dStr:fnD});
  renderGallery();
  setStatus(`已拍攝 ${photos.length} 張`);
  document.getElementById('shutter').style.background='#44ffcc';
  setTimeout(()=>document.getElementById('shutter').style.background='#fff',200);
}

function drawFallback(ctx,VW,VH){
  const mW=Math.round(VW*.22), mH=Math.round(mW*.80);
  const mx=VW-mW-14, my=VH-mH-14;
  ctx.fillStyle='#0f2a1a'; ctx.fillRect(mx,my,mW,mH);
  ctx.strokeStyle='#44ffcc'; ctx.lineWidth=2; ctx.strokeRect(mx,my,mW,mH);
  const cx=mx+mW/2,cy=my+mH/2;
  ctx.strokeStyle='rgba(68,255,204,.3)'; ctx.lineWidth=.8;
  [10,20,30].forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()});
  ctx.strokeStyle='#44ffcc'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-12,cy);ctx.lineTo(cx+12,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-12);ctx.lineTo(cx,cy+12);ctx.stroke();
  ctx.fillStyle='#44ffcc'; ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(68,255,204,.7)'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('按「抓地圖」',cx,my+mH-6); ctx.textAlign='left';
}

/* ═══ 分享 ═══ */
async function sharePhoto(){
  const p=photos[currentPhotoIdx];
  const fname=`photo_${p.dStr}_${p.tStr}.jpg`;
  try{
    const res=await fetch(p.url);
    const blob=await res.blob();
    const file=new File([blob],fname,{type:'image/jpeg'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'浮水印照片'});
      return;
    }
  }catch(e){ if(e.name==='AbortError') return; }
  // fallback 下載
  const a=document.createElement('a'); a.href=photos[currentPhotoIdx].url; a.download=fname; a.click();
}

/* ═══ 相簿 ═══ */
function renderGallery(){
  const g=document.getElementById('gallery'); g.innerHTML='';
  photos.forEach((p,i)=>{
    const w=document.createElement('div'); w.className='tw';
    const im=document.createElement('img'); im.src=p.url;
    im.onclick=()=>openPrev(i);
    const dl=document.createElement('button'); dl.className='td'; dl.textContent='✕';
    dl.onclick=e=>{e.stopPropagation();delPhoto(i)};
    w.appendChild(im); w.appendChild(dl); g.appendChild(w);
  });
}
function openPrev(i){
  currentPhotoIdx=i;
  document.getElementById('pimg').src=photos[i].url;
  document.getElementById('dl-btn').href=photos[i].url;
  document.getElementById('dl-btn').download=`photo_${photos[i].dStr}_${photos[i].tStr}.jpg`;
  setText('save-hint', navigator.share
    ?'點「分享/存相簿」→ 選「儲存影像」可存入 iOS 相簿'
    :'長按照片可儲存，或點⬇下載');
  document.getElementById('pmodal').classList.add('show');
}
function closePrev(){document.getElementById('pmodal').classList.remove('show');}
function delPhoto(i){photos.splice(i,1);renderGallery();setStatus(photos.length?`已拍攝 ${photos.length} 張`:'準備拍攝');}

/* ═══ 時鐘 ═══ */
function updateClock(){
  const n=new Date(),pad=x=>String(x).padStart(2,'0');
  const days=['日','一','二','三','四','五','六'];
  setText('wm-time',`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`);
  setText('wm-date',`${n.getFullYear()}.${pad(n.getMonth()+1)}.${pad(n.getDate())} 週${days[n.getDay()]}`);
}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function setStatus(v){setText('status',v);}

initCamera();
initGPS();
setInterval(updateClock,1000);
updateClock();
</script>
